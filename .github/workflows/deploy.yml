name: Cloudflare Deployment
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  deploy:
    name: Deploy
    environment: Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies for App
        working-directory: src/app
        run: pnpm install --frozen-lockfile

      - name: Install Dependencies for Server
        working-directory: src/server-worker
        run: pnpm install --frozen-lockfile

      - name: Generate Types for App
        working-directory: src/app
        run: pnpm run cf:gen

      - name: Generate Types for Server
        working-directory: src/server-worker
        run: pnpm run cf:gen

      - name: Build Project
        working-directory: src/app
        run: pnpm run cf:build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}

      - name: Run Migrations
        working-directory: src/server
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy Server to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          command: deploy
          workingDirectory: src/server-worker

      - name: Deploy App to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          command: deploy
          workingDirectory: src/app