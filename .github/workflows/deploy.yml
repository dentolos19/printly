name: Deployment
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      allow_reset:
        description: Reset Database
        type: boolean
        default: false
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  deploy:
    name: Deploy
    environment: Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies for App
        working-directory: src/app
        run: pnpm install --frozen-lockfile

      - name: Install Dependencies for Server
        working-directory: src/server-worker
        run: pnpm install --frozen-lockfile

      - name: Generate Types for App
        working-directory: src/app
        run: pnpm run cf:types

      - name: Generate Types for Server
        working-directory: src/server-worker
        run: pnpm run cf:types

      - name: Build App
        working-directory: src/app
        run: pnpm run cf:build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}

      - name: Build Server
        working-directory: src/server
        run: dotnet build --configuration Release

      - name: Run Migrations
        id: migrations
        continue-on-error: ${{ github.event.inputs.allow_reset == 'true' }}
        working-directory: src/server
        run: |
          dotnet tool restore
          dotnet ef database update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Reset Database (optional)
        if: steps.migrations.outcome == 'failure' && github.event.inputs.allow_reset == 'true'
        working-directory: src/server
        run: |
          echo "Migration failed. Dropping all tables..."
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql $DATABASE_URL -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          echo "Running migrations on clean schema..."
          dotnet ef database update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Post-Run Migrations
        if: steps.migrations.outcome == 'failure' && github.event.inputs.allow_reset != 'true'
        run: exit 1

      - name: Deploy Server to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          command: deploy
          workingDirectory: src/server-worker

      - name: Deploy App to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          command: deploy
          workingDirectory: src/app
